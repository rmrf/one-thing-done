# One Thing Done 配置文件

[server]
host = "0.0.0.0"
port = 9090

[security]
# API Key 用于验证请求，为空则不验证
apikey = "your-secret-api-key"

[[commands]]
slug = "restart_openclaw"
desc = "重启 OpenClash 服务"
cmd = "systemctl"
args = ["restart", "openclash-gateway.service"]

[[commands]]
slug = "status_openclaw"
desc = "查看 OpenClash 服务状态"
cmd = "systemctl"
args = ["status", "--no-pager", "openclash-gateway.service"]

[[commands]]
slug = "uptime"
desc = "查看系统运行时间"
cmd = "uptime"
args = []
